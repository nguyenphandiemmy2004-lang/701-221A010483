<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <title>Bài tập 2: Form đăng ký thành viên</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html">Trang Chủ</a>
        <a href="about.html">Phần 1: Lý Thuyết</a>
        <a href="baitap01.html">Bài Tập 1 (Sản phẩm)</a>

        <a href="baitap19.html">Bài Tập 19</a>
        <a href="contact.html">Thông Tin Điểm Danh</a>
    </nav>

    <main class="container">
        <div class="form-wrapper">
            <h2>Đăng Ký Tài Khoản</h2>
            
            <div id="form-msg"></div>

            <form id="register-form" novalidate>
                <div class="form-group">
                    <label for="name">Họ và tên</label>
                    <input type="text" id="name" placeholder="Nhập họ và tên của bạn...">
                </div>

                <div class="form-group">
                    <label for="email">Địa chỉ Email</label>
                    <input type="email" id="email" placeholder="example@gmail.com...">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Mật khẩu (ít nhất 8 ký tự)...">
                    <small class="hint">Mật khẩu phải từ 8 ký tự, bao gồm ít nhất 1 chữ hoa, 1 chữ thường và 1 số.</small>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="agree">
                    <label for="agree">Tôi đồng ý với mọi điều khoản và điều kiện dịch vụ</label>
                </div>

                <button type="submit" class="btn-submit">Đăng Ký Ngay</button>
            </form>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
